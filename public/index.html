<!DOCTYPE html>
<html lang="fo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samkomu Streamer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div id="setup" class="setup-container">
        <h1>Samkomu Streamer</h1>
        <input type="text" id="roomCode" placeholder="T.d. 1234" autocomplete="off">
        <div style="display:flex; gap:10px;">
            <button onclick="init('writer')">Stovna Sessión</button>
            <button onclick="init('reader')">Join Sessión</button>
        </div>
    </div>

    <div id="writer-ui" class="hidden" style="padding: 20px; text-align: center;">
        <h2>Sessión: <span id="active-code"></span></h2>
        <div id="qrcode"></div>
        <br>
        <textarea id="writer-input" placeholder="Byrja at skriva..."></textarea>
        <br><br>
        <button class="stop" onclick="terminate()">Enda Sessión fyri øll</button>
    </div>

    <div id="reader-ui" class="hidden">
        <div class="header">
            <button class="exit-btn" onclick="exitSession()">🏠</button>
            <select onchange="document.documentElement.style.setProperty('--size', this.value + 'px')">
                <option value="40">Lítil</option>
                <option value="60" selected>Miðal</option>
                <option value="90">Stórur</option>
            </select>
            <select onchange="applyTheme(this.value)">
                <option value="light">Ljóst</option>
                <option value="dark">Svart</option>
            </select>
            <div class="wpm-controls">
                <span>WPM: <b id="wpm-display">160</b></span>
                <button onclick="adjustWPM(-10)">-</button>
                <button onclick="adjustWPM(10)">+</button>
            </div>
            <div id="pause-indicator"><span class="dot"></span> <span>Steðgur í talu</span></div>
        </div>
        <div id="output"></div>
    </div>

    <script>
        const socket = io();
        
        // Error logging til Render
        window.onerror = function(message, source, lineno, colno, error) {
            if (socket && socket.connected) {
                socket.emit('client-error', { message, line: lineno, url: source });
            }
            return false;
        };

        let currentRoom = "";
        let wpm = 160;
        let textQueue = [];
        let isProcessing = false;
        let fullTextReceived = "";
        let pauseTimer = null;

        function init(role) {
            currentRoom = document.getElementById('roomCode').value.trim();
            if (!currentRoom) return alert("Skriva eina kotu!");
            if (role === 'writer') socket.emit('create-session', currentRoom);
            else socket.emit('join-session', currentRoom);
        }

        socket.on('session-created', (roomCode) => {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('writer-ui').classList.remove('hidden');
            document.getElementById('active-code').innerText = roomCode;
            new QRCode(document.getElementById("qrcode"), { text: window.location.origin + "?room=" + roomCode, width: 160, height: 160 });
            document.getElementById('writer-input').addEventListener('input', (e) => {
                socket.emit('text-update', { roomCode: currentRoom, text: e.target.value });
            });
        });

        socket.on('session-joined', () => {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('reader-ui').classList.remove('hidden');
        });

        socket.on('session-error', (msg) => alert(msg));

        function resetPauseTimer() {
            const indicator = document.getElementById('pause-indicator');
            if (indicator) indicator.style.opacity = "0";
            clearTimeout(pauseTimer);
            pauseTimer = setTimeout(() => {
                if (indicator && fullTextReceived.length > 0) indicator.style.opacity = "1";
            }, 10000);
        }

        socket.on('connect', () => {
            if (currentRoom) {
                const isWriter = !document.getElementById('writer-ui').classList.contains('hidden');
                if (isWriter) socket.emit('reclaim-session', currentRoom);
                else socket.emit('join-session', currentRoom);
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && !socket.connected) socket.connect();
        });

        function adjustWPM(val) {
            wpm = Math.max(10, wpm + val);
            document.getElementById('wpm-display').innerText = wpm;
        }

        function applyTheme(theme) {
            const themes = {
                light: { bg: '#ffffff', text: '#000000' },
                dark: { bg: '#000000', text: '#eeeeee' }
            };
            document.documentElement.style.setProperty('--bg', themes[theme].bg);
            document.documentElement.style.setProperty('--text', themes[theme].text);
        }

        function exitSession() {
            if(confirm("Vilt tú fara út?")) location.href = window.location.origin + window.location.pathname;
        }

        function checkAndScroll() {
            const out = document.getElementById('output');
            const rect = out.getBoundingClientRect();
            const textBottom = rect.top + rect.height;
            const triggerPoint = window.innerHeight * 0.8;
            if (textBottom > triggerPoint) {
                window.scrollBy({ top: textBottom - triggerPoint, behavior: 'smooth' });
            }
        }

        async function processQueue() {
            if (isProcessing || textQueue.length === 0) return;
            isProcessing = true;
            const out = document.getElementById('output');
            while (textQueue.length > 0) {
                const chunk = textQueue.shift();
                const words = chunk.split(/(\s+)/);
                for (let word of words) {
                    out.innerText += word;
                    if (word.trim()) {
                        let delay = (60 / wpm) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        checkAndScroll();
                    }
                }
            }
            isProcessing = false;
        }

        socket.on('text-receive', (newFullText) => {
            resetPauseTimer();
            if (newFullText.length > fullTextReceived.length) {
                const newChunk = newFullText.slice(fullTextReceived.length);
                textQueue.push(newChunk);
                fullTextReceived = newFullText;
                processQueue();
            } else {
                fullTextReceived = newFullText;
                document.getElementById('output').innerText = newFullText;
            }
        });

        function terminate() {
            if (confirm("Vilt tú steðga sessiónini?")) socket.emit('stop-session', currentRoom);
        }
        
        socket.on('session-ended', () => {
            alert("Sessión endað.");
            location.href = window.location.origin + window.location.pathname;
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('room')) {
            document.getElementById('roomCode').value = urlParams.get('room');
            init('reader');
        }
    </script>
</body>
</html>
