<!DOCTYPE html>
<html lang="fo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tekst Stroyming</title>
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div id="setup" class="setup-container">
        <h1 id="txt-setup-title"></h1>
        <input type="text" id="roomCode" autocomplete="off">
        <div style="display:flex; gap:10px;">
            <button onclick="init('writer')" id="txt-btn-create"></button>
            <button onclick="init('reader')" id="txt-btn-join"></button>
        </div>

        <div class="setup-info">
            <h2 id="txt-about-title"></h2>
            <p id="txt-about-p1"></p>
            <p id="txt-about-p2"></p>
            <p id="txt-about-p3"></p>
            <p id="txt-about-p4"></p>
            <p id="txt-about-p5"></p>
            <p id="txt-about-p6"></p>
            <p id="txt-about-p7"></p>
            <div class="footer-note" id="txt-about-footer"></div>
        </div>
    </div>

    <div id="writer-ui" class="hidden" style="padding: 20px; text-align: center;">
        <div class="reader-badge">👁️ <span id="reader-count">0</span> <span id="txt-readers-online"></span></div>
        <h2><span id="txt-writer-header"></span><span id="active-code"></span></h2>
        <div id="qrcode"></div>
        <br>
        <textarea id="writer-input"></textarea>
        <br><br>
        <button class="stop" onclick="terminate()" id="txt-writer-terminate"></button>
    </div>

    <div id="reader-ui" class="hidden">
        <div class="header">
            <button class="exit-btn" onclick="exitSession()" id="txt-reader-exit"></button>
            <select id="size-select" onchange="document.documentElement.style.setProperty('--size', this.value + 'px')"></select>
            <select id="theme-select" onchange="applyTheme(this.value)"></select>
            <div class="wpm-controls">
                <button onclick="adjustWPM(-10)">-</button>
                <span>WPM: <b id="wpm-display">200</b></span>
                <button onclick="adjustWPM(10)">+</button>
            </div>
            <div id="pause-indicator"><span class="dot"></span> <span id="txt-reader-pause"></span></div>
            <div id="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
        </div>
        <div id="output"></div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "", wpm = 200, textQueue = [], isProcessing = false;
        let fullTextReceived = "", lastSentText = "", pauseTimer = null, typingTimer = null;
        let wakeLock = null;

        // --- SETA TEKSTIR INN ÚR LANG.JS ---
        function applyLanguage() {
            document.title = lang.title;
            document.getElementById('txt-setup-title').innerText = lang.setup_title;
            document.getElementById('roomCode').placeholder = lang.setup_placeholder;
            document.getElementById('txt-btn-create').innerText = lang.btn_create;
            document.getElementById('txt-btn-join').innerText = lang.btn_join;
            document.getElementById('txt-readers-online').innerText = lang.readers_online;
            document.getElementById('txt-writer-header').innerText = lang.writer_header;
            document.getElementById('writer-input').placeholder = lang.writer_placeholder;
            document.getElementById('txt-writer-terminate').innerText = lang.writer_terminate;
            document.getElementById('txt-reader-exit').innerText = lang.reader_exit;
            document.getElementById('txt-reader-pause').innerText = lang.reader_pause;
            
            // About partur
            document.getElementById('txt-about-title').innerText = lang.about_title;
            document.getElementById('txt-about-p1').innerText = lang.about_p1;
            document.getElementById('txt-about-p2').innerText = lang.about_p2;
            document.getElementById('txt-about-p3').innerText = lang.about_p3;
            document.getElementById('txt-about-p4').innerText = lang.about_p4;
            document.getElementById('txt-about-p5').innerText = lang.about_p5;
            document.getElementById('txt-about-p6').innerText = lang.about_p6;
            
            // Ger GitHub linkið virkið
            document.getElementById('txt-about-p7').innerHTML = lang.about_p7.replace(
                'https://github.com/hogni89/textstreamer', 
                '<a href="https://github.com/hogni89/textstreamer" target="_blank" style="color:var(--accent)">GitHub</a>'
            );
            document.getElementById('txt-about-footer').innerText = lang.about_footer;

            // Select boksar
            document.getElementById('size-select').innerHTML = `
                <option value="40">${lang.reader_size_small}</option>
                <option value="60" selected>${lang.reader_size_medium}</option>
                <option value="90">${lang.reader_size_large}</option>`;
            document.getElementById('theme-select').innerHTML = `
                <option value="light">${lang.reader_theme_light}</option>
                <option value="dark">${lang.reader_theme_dark}</option>`;
        }

        applyLanguage();

        // --- WAKE LOCK API ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }

        function init(role) {
            currentRoom = document.getElementById('roomCode').value.trim();
            if (!currentRoom) return alert(lang.alert_no_code);
            socket.emit(role === 'writer' ? 'create-session' : 'join-session', currentRoom);
        }

        socket.on('session-created', (roomCode) => {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('writer-ui').classList.remove('hidden');
            document.getElementById('active-code').innerText = roomCode;
            const input = document.getElementById('writer-input');
            input.focus();
            new QRCode(document.getElementById("qrcode"), { text: window.location.origin + "?room=" + roomCode, width: 140, height: 140 });
            
            input.addEventListener('input', (e) => {
                const currentText = e.target.value;
                if (currentText.length > lastSentText.length) {
                    const delta = currentText.slice(lastSentText.length);
                    socket.emit('text-delta', { roomCode: currentRoom, delta: delta });
                    lastSentText = currentText;
                } else if (currentText.length === 0) {
                    socket.emit('text-reset', { roomCode: currentRoom });
                    lastSentText = "";
                } else {
                    lastSentText = currentText;
                }
            });
        });

        socket.on('session-joined', () => {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('reader-ui').classList.remove('hidden');
            requestWakeLock();
        });

        socket.on('reader-count', (count) => {
            document.getElementById('reader-count').innerText = count;
        });

        socket.on('text-delta', (delta) => {
            const indicator = document.getElementById('typing-indicator');
            indicator.style.display = "block";
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => indicator.style.display = "none", 2000);
            
            const pIndicator = document.getElementById('pause-indicator');
            if (pIndicator) pIndicator.style.opacity = "0";
            clearTimeout(pauseTimer);
            pauseTimer = setTimeout(() => { if (fullTextReceived.length > 0) pIndicator.style.opacity = "1"; }, 10000);

            textQueue.push(delta);
            fullTextReceived += delta;
            processQueue();
        });

        socket.on('text-reset', () => {
            textQueue = []; fullTextReceived = "";
            document.getElementById('output').innerHTML = '';
        });

        async function processQueue() {
            if (isProcessing || textQueue.length === 0) return;
            isProcessing = true;
            const out = document.getElementById('output');
            while (textQueue.length > 0) {
                const chunk = textQueue.shift();
                const tokens = chunk.split(/(\r\n|\n|\r|\s+)/);
                for (let token of tokens) {
                    if (!token) continue;
                    const span = document.createElement('span');
                    if (token === '\n' || token === '\r' || token === '\r\n') {
                        span.innerHTML = '<br>';
                    } else {
                        span.className = 'word';
                        span.innerText = token;
                    }
                    out.appendChild(span);
                    if (token.trim()) {
                        await new Promise(r => setTimeout(r, (60 / wpm) * 1000));
                        
                        // SCROLLING LOGIKKUR:
                        const rect = out.getBoundingClientRect();
                        // Vit setu trigger til 95% av skermhæddini
                        const trigger = window.innerHeight * 0.95; 
                        
                        if (rect.top + rect.height > trigger) {
                            window.scrollBy({ 
                                top: (rect.top + rect.height) - trigger, 
                                behavior: 'smooth' 
                            });
                        }
                    }
                }
            }
            isProcessing = false;
        }

        function adjustWPM(val) {
            wpm = Math.max(40, Math.min(400, wpm + val));
            document.getElementById('wpm-display').innerText = wpm;
        }

        function applyTheme(theme) {
            const themes = { light: { bg: '#ffffff', text: '#000000' }, dark: { bg: '#000000', text: '#eeeeee' } };
            document.documentElement.style.setProperty('--bg', themes[theme].bg);
            document.documentElement.style.setProperty('--text', themes[theme].text);
        }

        function exitSession() { if(confirm(lang.confirm_exit)) location.href = window.location.origin + window.location.pathname; }
        function terminate() { if (confirm(lang.confirm_terminate)) socket.emit('stop-session', currentRoom); }
        
        socket.on('session-ended', () => { alert(lang.alert_session_ended); location.href = window.location.origin + window.location.pathname; });
        socket.on('session-error', (msg) => {
            if (msg === 'Henda sessiónskotan er longu í brúk.') alert(lang.error_session_exists);
            else if (msg === 'Sessiónin finst ikki.') alert(lang.error_session_missing);
            else alert(msg);
        });

        socket.on('connect', () => {
            if (currentRoom) {
                const isWriter = !document.getElementById('writer-ui').classList.contains('hidden');
                socket.emit(isWriter ? 'reclaim-session' : 'join-session', currentRoom);
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('room')) { document.getElementById('roomCode').value = urlParams.get('room'); init('reader'); }
    </script>
</body>
</html>
